<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda | Personal Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <header>
            <h1 id="heading">Agenda</h1>
            <p class="subtitle">Organize your day with precision.</p>
        </header>

        <div id="addContainer">
            <input id="inputText" type="text" placeholder="Add a new commitment..." maxlength="60">
            <button id="addButton">Add Task</button>
        </div>

        <div id="listContainer">
            <!-- JavaScript will populate tasks here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
