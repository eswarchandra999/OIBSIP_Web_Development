<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <div id="display">0</div>
        
        <div id="buttonsContainer">
            <button onclick="clearValue()" class="control">AC</button>
            <button onclick="deleteLast()" class="control">DEL</button>
            <button onclick="appendValue('%')" class="control">%</button>
            <button onclick="appendValue('/')" class="operator">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')" class="operator">×</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')" class="operator">−</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('(')" class="special">(</button>
            <button onclick="appendValue(')')" class="special">)</button>
            <button onclick="appendPI()" class="special">π</button>
            <button onclick="calculateSqrt()" class="special">√</button>

            <button onclick="appendValue('0')" class="zero-btn">0</button>
            <button onclick="appendValue('.')" class="special">.</button>
            <button onclick="calculate()" id="equal">=</button>
        </div> 
    </div>

    <script src="script.js"></script> 
</body>
</html>
